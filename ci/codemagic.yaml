workflows:
  ios-pr-check:
    name: Nuvyra iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 45
    triggering:
      events:
        - pull_request
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        WIDGET_BUNDLE_ID: "com.nuvyra.app.widget"
        APP_STORE_APPLE_ID: "6763769241"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
        XCODE_TEST_SCHEME: "NuvyraCI"
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Validate simulator build
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_TEST_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  ios-testflight:
    name: Nuvyra iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        WIDGET_BUNDLE_ID: "com.nuvyra.app.widget"
        APP_STORE_APPLE_ID: "6763769241"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
        XCODE_TEST_SCHEME: "NuvyraCI"
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "$BUNDLE_ID"
    integrations:
      app_store_connect: codemagic_app_store_connect
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Validate simulator build
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_TEST_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          agvtool new-version -all $CM_BUILD_NUMBER || true
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Validate IPA metadata
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          test -n "$IPA_PATH"
          rm -rf /tmp/nuvyra_ipa
          mkdir -p /tmp/nuvyra_ipa
          unzip -q "$IPA_PATH" -d /tmp/nuvyra_ipa
          APP_DIR=$(find /tmp/nuvyra_ipa/Payload -maxdepth 1 -name "*.app" -type d | head -n 1)
          test -n "$APP_DIR"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName" "$APP_DIR/Info.plist"
          test -f "$APP_DIR/AppIcon60x60@2x.png"
          test -f "$APP_DIR/AppIcon40x40@3x.png"
          file "$APP_DIR/AppIcon60x60@2x.png"
          file "$APP_DIR/AppIcon40x40@3x.png"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Internal Testers
