name: Nuvyra
options:
  bundleIdPrefix: com.nuvyra
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
fileGroups:
  - Nuvyra/Resources/Nuvyra.storekit
targets:
  Nuvyra:
    type: application
    platform: iOS
    sources:
      - path: Nuvyra
        excludes:
          - Resources
          - Tests
          - Widgets
    resources:
      - path: Nuvyra/Resources/Assets.xcassets
      - path: Nuvyra/Resources/Localizable.xcstrings
      - path: Nuvyra/Resources/PrivacyInfo.xcprivacy
    dependencies:
      - target: NuvyraWidgetExtension
        embed: true
      - sdk: HealthKit.framework
      - sdk: StoreKit.framework
      - sdk: Security.framework
      - sdk: UserNotifications.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
    info:
      path: Nuvyra/Resources/Info.plist
    entitlements:
      path: Nuvyra/Resources/Nuvyra.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app
        PRODUCT_NAME: Nuvyra
        DEVELOPMENT_TEAM: J5CYS3RDGH
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Nuvyra/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nuvyra/Resources/Nuvyra.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
  NuvyraWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Nuvyra/Widgets
      - path: Nuvyra/DesignSystem
    dependencies:
      - sdk: WidgetKit.framework
    info:
      path: Nuvyra/Widgets/Info.plist
    entitlements:
      path: Nuvyra/Widgets/NuvyraWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.widget
        PRODUCT_NAME: NuvyraWidgetExtension
        DEVELOPMENT_TEAM: J5CYS3RDGH
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Nuvyra/Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nuvyra/Widgets/NuvyraWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_BUNDLE_PACKAGE_TYPE: XPC!
        PRODUCT_BUNDLE_EXTENSION: appex
        SKIP_INSTALL: YES
  NuvyraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Nuvyra/Tests/NuvyraUnitTests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.tests
  NuvyraUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Nuvyra/Tests/NuvyraUITests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.uitests
schemes:
  Nuvyra:
    build:
      targets:
        Nuvyra: all
        NuvyraWidgetExtension: all
        NuvyraTests: [test]
        NuvyraUITests: [test]
    test:
      targets:
        - NuvyraTests
        - NuvyraUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
  NuvyraCI:
    build:
      targets:
        Nuvyra: all
        NuvyraTests: [test]
    test:
      targets:
        - NuvyraTests
      gatherCoverageData: true
