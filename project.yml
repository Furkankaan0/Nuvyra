name: Nuvyra
options:
  bundleIdPrefix: com.nuvyra
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
fileGroups:
  - Nuvyra/Resources/Nuvyra.storekit
targets:
  Nuvyra:
    type: application
    platform: iOS
    sources:
      - path: Nuvyra
        excludes:
          - Resources
          - Tests
          - Widgets
      - path: BarcodeScanner
      - path: Nuvyra/Resources/Assets.xcassets
        buildPhase: resources
      - path: Nuvyra/Resources/AppIconFiles
        buildPhase: resources
      - path: Nuvyra/Resources/Localizable.xcstrings
        buildPhase: resources
      - path: Nuvyra/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Nuvyra/Resources/LocalFoodDatabase.json
        buildPhase: resources
    dependencies:
      - target: NuvyraWidgetExtension
        embed: true
      - sdk: HealthKit.framework
      - sdk: StoreKit.framework
      - sdk: Security.framework
      - sdk: UserNotifications.framework
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreML.framework
      - sdk: libsqlite3.tbd
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - sdk: ActivityKit.framework
      - sdk: WidgetKit.framework
      - sdk: AppIntents.framework
      - sdk: CoreHaptics.framework
      - sdk: AuthenticationServices.framework
      - sdk: WatchConnectivity.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app
        PRODUCT_NAME: Nuvyra
        PRODUCT_BUNDLE_PACKAGE_TYPE: APPL
        DEVELOPMENT_TEAM: J5CYS3RDGH
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Nuvyra/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nuvyra/Resources/Nuvyra.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: all
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        SUPPORTS_MACCATALYST: NO
  NuvyraWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Nuvyra/Widgets
      - path: Nuvyra/Shared
      - path: Nuvyra/DesignSystem/NuvyraColors.swift
      - path: Nuvyra/DesignSystem/NuvyraProgressRing.swift
      - path: Nuvyra/DesignSystem/NuvyraTypography.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.widget
        PRODUCT_NAME: NuvyraWidgetExtension
        DEVELOPMENT_TEAM: J5CYS3RDGH
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Nuvyra/Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nuvyra/Widgets/NuvyraWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        # PRODUCT_BUNDLE_PACKAGE_TYPE removed — Xcode infers "XPC!" automatically
        # from the `app-extension` product type. Setting it explicitly with the
        # legacy "XPC!" string trips Xcode 15/16 archive validation.
        PRODUCT_BUNDLE_EXTENSION: appex
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
  NuvyraWatch:
    type: application
    platform: watchOS
    sources:
      - path: NuvyraWatch
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.watchkitapp
        PRODUCT_NAME: NuvyraWatch
        PRODUCT_BUNDLE_PACKAGE_TYPE: APPL
        DEVELOPMENT_TEAM: J5CYS3RDGH
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NuvyraWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: NuvyraWatch/NuvyraWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTS_MACCATALYST: NO
        SKIP_INSTALL: NO
  NuvyraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Nuvyra/Tests/NuvyraUnitTests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.tests
  NuvyraUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Nuvyra/Tests/NuvyraUITests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.uitests
schemes:
  Nuvyra:
    build:
      targets:
        Nuvyra: all
        NuvyraTests: [test]
        NuvyraUITests: [test]
    test:
      targets:
        - NuvyraTests
        - NuvyraUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
  NuvyraCI:
    build:
      targets:
        Nuvyra: all
        NuvyraTests: [test]
    test:
      targets:
        - NuvyraTests
      gatherCoverageData: true
