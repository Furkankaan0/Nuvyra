workflows:
  ios-pr-check:
    name: Nuvyra iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 45
    triggering:
      events:
        - pull_request
    environment:
      xcode: 26.4
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        WIDGET_BUNDLE_ID: "com.nuvyra.app.widget"
        APP_STORE_APPLE_ID: "6763769241"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
        XCODE_TEST_SCHEME: "NuvyraCI"
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version
      - name: Install Metal Toolchain if needed
        script: |
          set -euo pipefail
          if xcrun -sdk iphonesimulator metal -help >/dev/null 2>&1; then
            echo "Metal Toolchain already available."
          else
            echo "Metal Toolchain missing; downloading and importing Xcode component."
            METAL_EXPORT_DIR="/tmp/nuvyra-metal-toolchain"
            rm -rf "$METAL_EXPORT_DIR"
            mkdir -p "$METAL_EXPORT_DIR"

            xcodebuild -downloadComponent MetalToolchain -exportPath "$METAL_EXPORT_DIR"
            METAL_BUNDLE="$(find "$METAL_EXPORT_DIR" -name 'MetalToolchain*.exportedBundle' -print -quit)"
            if [ -n "$METAL_BUNDLE" ]; then
              xcodebuild -importComponent MetalToolchain -importPath "$METAL_BUNDLE" || true
            fi

            if ! xcrun -sdk iphonesimulator metal -help >/dev/null 2>&1; then
              METAL_DMG="$(find /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain -path '*/AssetData/Restore/*.dmg' -print 2>/dev/null | sort | tail -n 1)"
              if [ -n "$METAL_DMG" ]; then
                hdiutil attach -nobrowse -readonly "$METAL_DMG"
              fi
            fi

            xcrun -sdk iphonesimulator metal -help >/dev/null
          fi
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Inject runtime secrets into Secrets.xcconfig
        # Writes Codemagic environment variables into a local xcconfig that
        # Defaults.xcconfig `#include?`s. Missing variables stay empty and the
        # app falls back to its on-device mocks at runtime.
        script: |
          set -euo pipefail
          SECRETS_FILE="Nuvyra/Resources/Secrets.xcconfig"
          mkdir -p "$(dirname "$SECRETS_FILE")"
          {
            echo "// Auto-generated by Codemagic — do not edit."
            echo "CLAUDE_API_KEY = ${CLAUDE_API_KEY:-}"
            echo "CLAUDE_MODEL = ${CLAUDE_MODEL:-}"
            echo "CLAUDE_ENDPOINT = ${CLAUDE_ENDPOINT:-}"
            echo "FATSECRET_CLIENT_ID = ${FATSECRET_CLIENT_ID:-}"
            echo "FATSECRET_CLIENT_SECRET = ${FATSECRET_CLIENT_SECRET:-}"
            echo "FATSECRET_SCOPE = ${FATSECRET_SCOPE:-}"
            echo "FATSECRET_REGION = ${FATSECRET_REGION:-}"
            echo "FATSECRET_LANGUAGE = ${FATSECRET_LANGUAGE:-}"
            echo "USDA_API_KEY = ${USDA_API_KEY:-}"
          } > "$SECRETS_FILE"
          if [ -n "${CLAUDE_API_KEY:-}" ]; then
            echo "CLAUDE_API_KEY: present"
          else
            echo "CLAUDE_API_KEY: absent — RemoteAICoachService will fall back to MockAICoachService"
          fi
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Validate simulator build
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_TEST_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xcodebuild_logs/validate-simulator-build.log
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  ios-testflight:
    name: Nuvyra iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
    environment:
      xcode: 26.4
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        WIDGET_BUNDLE_ID: "com.nuvyra.app.widget"
        APP_STORE_APPLE_ID: "6763769241"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
        XCODE_TEST_SCHEME: "NuvyraCI"
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "$BUNDLE_ID"
    integrations:
      app_store_connect: codemagic_app_store_connect
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version
      - name: Install Metal Toolchain if needed
        script: |
          set -euo pipefail
          if xcrun -sdk iphonesimulator metal -help >/dev/null 2>&1; then
            echo "Metal Toolchain already available."
          else
            echo "Metal Toolchain missing; downloading and importing Xcode component."
            METAL_EXPORT_DIR="/tmp/nuvyra-metal-toolchain"
            rm -rf "$METAL_EXPORT_DIR"
            mkdir -p "$METAL_EXPORT_DIR"

            xcodebuild -downloadComponent MetalToolchain -exportPath "$METAL_EXPORT_DIR"
            METAL_BUNDLE="$(find "$METAL_EXPORT_DIR" -name 'MetalToolchain*.exportedBundle' -print -quit)"
            if [ -n "$METAL_BUNDLE" ]; then
              xcodebuild -importComponent MetalToolchain -importPath "$METAL_BUNDLE" || true
            fi

            if ! xcrun -sdk iphonesimulator metal -help >/dev/null 2>&1; then
              METAL_DMG="$(find /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain -path '*/AssetData/Restore/*.dmg' -print 2>/dev/null | sort | tail -n 1)"
              if [ -n "$METAL_DMG" ]; then
                hdiutil attach -nobrowse -readonly "$METAL_DMG"
              fi
            fi

            xcrun -sdk iphonesimulator metal -help >/dev/null
          fi
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Inject runtime secrets into Secrets.xcconfig
        # Writes Codemagic environment variables into a local xcconfig that
        # Defaults.xcconfig `#include?`s. Missing variables stay empty and the
        # app falls back to its on-device mocks at runtime.
        script: |
          set -euo pipefail
          SECRETS_FILE="Nuvyra/Resources/Secrets.xcconfig"
          mkdir -p "$(dirname "$SECRETS_FILE")"
          {
            echo "// Auto-generated by Codemagic — do not edit."
            echo "CLAUDE_API_KEY = ${CLAUDE_API_KEY:-}"
            echo "CLAUDE_MODEL = ${CLAUDE_MODEL:-}"
            echo "CLAUDE_ENDPOINT = ${CLAUDE_ENDPOINT:-}"
            echo "FATSECRET_CLIENT_ID = ${FATSECRET_CLIENT_ID:-}"
            echo "FATSECRET_CLIENT_SECRET = ${FATSECRET_CLIENT_SECRET:-}"
            echo "FATSECRET_SCOPE = ${FATSECRET_SCOPE:-}"
            echo "FATSECRET_REGION = ${FATSECRET_REGION:-}"
            echo "FATSECRET_LANGUAGE = ${FATSECRET_LANGUAGE:-}"
            echo "USDA_API_KEY = ${USDA_API_KEY:-}"
          } > "$SECRETS_FILE"
          if [ -n "${CLAUDE_API_KEY:-}" ]; then
            echo "CLAUDE_API_KEY: present"
          else
            echo "CLAUDE_API_KEY: absent — RemoteAICoachService will fall back to MockAICoachService"
          fi
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Validate simulator build
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_TEST_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xcodebuild_logs/validate-simulator-build.log
      - name: Fetch App Store signing files
        script: |
          set -euo pipefail
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "$WIDGET_BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Show archive signing settings
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings \
            | egrep 'PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|CODE_SIGN_ENTITLEMENTS|DEVELOPMENT_TEAM|PROVISIONING_PROFILE_SPECIFIER|PROVISIONING_PROFILE =' \
            | tee /tmp/xcodebuild_logs/archive-signing-settings.log
      - name: Increment build number
        script: |
          set -euo pipefail
          BUILD_NUMBER="${CM_BUILD_NUMBER:-$(date +%s)}"
          echo "Setting CFBundleVersion to $BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings | grep CURRENT_PROJECT_VERSION
      - name: Build ipa
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" 2>&1 | tee /tmp/xcodebuild_logs/build-ipa.log
      - name: Validate IPA metadata
        script: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          test -n "$IPA_PATH"
          rm -rf /tmp/nuvyra_ipa
          mkdir -p /tmp/nuvyra_ipa
          unzip -q "$IPA_PATH" -d /tmp/nuvyra_ipa
          APP_DIR=$(find /tmp/nuvyra_ipa/Payload -maxdepth 1 -name "*.app" -type d | head -n 1)
          test -n "$APP_DIR"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :NSSupportsLiveActivities" "$APP_DIR/Info.plist"
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_DIR/Info.plist")
          echo "CFBundleVersion=$BUNDLE_VERSION"
          case "$BUNDLE_VERSION" in ''|*[!0-9]*) echo "CFBundleVersion must be numeric"; exit 1 ;; esac
          test "$BUNDLE_VERSION" -gt 1
          WIDGET_DIR="$APP_DIR/PlugIns/NuvyraWidgetExtension.appex"
          test -d "$WIDGET_DIR"
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$WIDGET_DIR/Info.plist"
          test -f "$APP_DIR/AppIcon60x60@2x.png"
          test -f "$APP_DIR/AppIcon40x40@3x.png"
          test -f "$APP_DIR/Assets.car"
          xcrun assetutil --info "$APP_DIR/Assets.car" | grep -q 'AppIcon'
          file "$APP_DIR/AppIcon60x60@2x.png"
          file "$APP_DIR/AppIcon40x40@3x.png"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Internal Testers
