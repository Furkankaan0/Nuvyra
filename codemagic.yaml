workflows:
  ios-pr-check:
    name: Nuvyra iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 45
    triggering:
      events:
        - pull_request
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  ios-testflight:
    name: Nuvyra iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.nuvyra.app"
        APPLE_TEAM_ID: "J5CYS3RDGH"
        APPLE_DEVELOPER_ID: "579d53d0-534c-40bd-80e7-b964c69447e5"
        XCODE_PROJECT: "Nuvyra.xcodeproj"
        XCODE_SCHEME: "Nuvyra"
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "$BUNDLE_ID"
    integrations:
      app_store_connect: codemagic_app_store_connect
    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          agvtool new-version -all $CM_BUILD_NUMBER || true

      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Internal Testers
